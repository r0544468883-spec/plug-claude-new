    <!-- TODO: Set the document title to the name of your application -->
    <title>PLUG</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />
    <script>
      // Set direction before React mounts to prevent LTR flash
      (function() {
        var lang = localStorage.getItem('plug-language');
        var dir = (!lang || lang === 'he') ? 'rtl' : 'ltr';
        document.documentElement.dir = dir;
        document.documentElement.lang = lang || 'he';
      })();
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script>
      // Preview safeguard: clear stale SW/cache shells that can cause blank/black screen.
      (async () => {
        const host = window.location.hostname;
        const isPreviewHost = host.includes("lovableproject.com") || host.includes("id-preview--") || host.includes("lovable.app");
        if (!isPreviewHost) return;

        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (_) {
          // no-op
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
